<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>DessertShop · 甜品店</title>
    <style>
        /* ============================================================
           Apple-Inspired Design System · Liquid Glass Morphism
           ============================================================ */

        :root {
            /* ── Apple-style palette ── */
            --bg:            #f5f5f7;
            --card-solid:    #ffffff;
            --card-glass:    rgba(255,255,255,0.72);
            --card-glass-strong: rgba(255,255,255,0.88);
            --text:          #1d1d1f;
            --text-secondary:#86868b;
            --text-tertiary: #aeaeb2;
            --hairline:      rgba(0,0,0,0.06);
            --hairline-strong: rgba(0,0,0,0.10);

            /* ── Brand accent (warm rose → match dessert identity) ── */
            --accent:        #d9574a;
            --accent-soft:   rgba(217,87,74,0.08);
            --accent-glow:   rgba(217,87,74,0.18);

            /* ── Spacing tokens ── */
            --nav-h:         48px;
            --bottom-h:      82px;
            --safe-bottom:   env(safe-area-inset-bottom, 16px);
            --content-max:   430px;
            --pad:           18px;

            /* ── Radius tokens ── */
            --r-sm:          12px;
            --r-md:          18px;
            --r-lg:          24px;
            --r-xl:          999px;

            /* ── Animation curves ── */
            --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-apple:    cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-top: var(--nav-h);
            padding-bottom: var(--bottom-h);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }

        /* ── Ambient background glow ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(217,87,74,0.06) 0%, transparent 55%),
                radial-gradient(ellipse 60% 45% at 85% 90%, rgba(217,87,74,0.04) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(180,160,200,0.03) 0%, transparent 60%);
        }

        /* ============================================================
           STATUS BAR
           ============================================================ */
        .status-bar {
            position: fixed; top:0; left:50%; transform: translateX(-50%);
            width: 100%; max-width: var(--content-max); z-index: 200;
            height: 0; /* collapsed — just for safe-area reference */;
            pointer-events: none;
        }

        /* ============================================================
           TOP NAVIGATION · LIQUID GLASS
           ============================================================ */
        .top-nav {
            position: fixed; top:0; left:50%; transform: translateX(-50%);
            width: 100%; max-width: var(--content-max); z-index: 110;
            height: var(--nav-h);
            padding: 0 var(--pad);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(245,245,247,0.68);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border-bottom: 0.5px solid var(--hairline);
            /* Liquid glass inner highlight */
            box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.7);
        }
        .top-nav .logo-group {
            display: flex; align-items: center; gap: 8px;
        }
        .top-nav .logo-icon {
            font-size: 20px;
            filter: drop-shadow(0 2px 4px rgba(217,87,74,0.25));
            transition: transform 0.35s var(--ease-spring);
        }
        .top-nav .logo-icon:active { transform: scale(1.2) rotate(8deg); }
        .top-nav .logo-text {
            font-size: 18px; font-weight: 620;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #d9574a 20%, #b8453a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-nav .nav-actions { display:flex; gap:6px; align-items:center; }
        .top-nav .nav-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: none;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s var(--ease-apple);
            position: relative;
        }
        .top-nav .nav-btn:active { background: rgba(0,0,0,0.04); }
        .cart-dot {
            position: absolute; top: 4px; right: 4px;
            min-width: 17px; height: 17px; border-radius: 9px;
            background: var(--accent); color: #fff;
            font-size: 10px; font-weight: 650;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px;
            transition: transform 0.3s var(--ease-spring);
            box-shadow: 0 2px 6px var(--accent-glow);
        }
        .cart-dot:empty { display:none; }
        .cart-dot.pop { transform:scale(1.4); }

        /* ============================================================
           HERO CAROUSEL · APPLE TV+ STYLE
           ============================================================ */
        .hero-wrap {
            margin: 12px var(--pad) 18px;
            position: relative;
        }
        .hero {
            border-radius: var(--r-lg);
            height: 260px;
            position: relative; overflow: hidden;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.06),
                0 1px 2px rgba(0,0,0,0.04);
        }
        .hero-track {
            display: flex; height: 100%;
            transition: transform 0.65s var(--ease-out-expo);
        }
        .hero-slide {
            min-width: 100%; height: 100%;
            padding: 44px 32px;
            display: flex; align-items: flex-end;
            color: #fff; position: relative; overflow: hidden;
        }
        /* Slide backgrounds with subtle grain-like depth */
        .hero-slide.s1 {
            background: linear-gradient(155deg, #3d1c22 0%, #8b3a44 35%, #c94d63 70%, #e8a0a8 100%);
        }
        .hero-slide.s2 {
            background: linear-gradient(155deg, #2d1f14 0%, #7a5230 35%, #c4844a 70%, #e8c89e 100%);
        }
        .hero-slide.s3 {
            background: linear-gradient(155deg, #1a2c24 0%, #3d7060 35%, #5b9e8a 70%, #a8d8c8 100%);
        }
        /* Liquid glass accent orb inside hero */
        .hero-slide::before {
            content: '';
            position: absolute; top: -40%; right: -20%;
            width: 280px; height: 280px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            filter: blur(60px);
        }
        .hero-content { position:relative; z-index:1; }
        .hero-kicker {
            display: block; font-size: 10px; font-weight: 600;
            letter-spacing: 0.22em; text-transform: uppercase;
            opacity: 0.5; margin-bottom: 8px;
        }
        .hero-slide h2 {
            font-size: 34px; font-weight: 640;
            letter-spacing: -0.6px; line-height: 1.08;
            margin: 0 0 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .hero-sub {
            font-size: 13px; font-weight: 440;
            opacity: 0.72; letter-spacing: -0.1px;
        }
        /* Dot indicators */
        .hero-dots {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 2;
        }
        .hero-dots .dot {
            width: 7px; height: 7px; border-radius: 4px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.5s var(--ease-out-expo);
            cursor: pointer; border: 0.5px solid rgba(255,255,255,0.15);
        }
        .hero-dots .dot.on {
            width: 26px;
            background: rgba(255,255,255,0.85);
            border-color: rgba(255,255,255,0.3);
        }

        /* ============================================================
           CATEGORY PILLS · FROSTED GLASS
           ============================================================ */
        .cat-scroll {
            padding: 2px var(--pad) 14px;
            overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
            display: flex; gap: 8px;
        }
        .cat-scroll::-webkit-scrollbar { display:none; }
        .cat-pill {
            flex-shrink: 0; padding: 8px 18px; border-radius: var(--r-xl);
            font-size: 13px; font-weight: 500; cursor: pointer;
            white-space: nowrap; border: none;
            background: var(--card-glass);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            color: var(--text-secondary);
            border: 0.5px solid rgba(255,255,255,0.5);
            box-shadow:
                0 2px 8px rgba(0,0,0,0.02),
                inset 0 0.5px 0 rgba(255,255,255,0.6);
            transition: all 0.3s var(--ease-out-expo);
        }
        .cat-pill:active { transform:scale(0.94); }
        .cat-pill.active {
            background: #1d1d1f;
            color: #fff; font-weight: 560;
            border-color: rgba(255,255,255,0.08);
            box-shadow:
                0 6px 18px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        /* ============================================================
           SECTION HEADER
           ============================================================ */
        .section-head {
            padding: 4px var(--pad) 10px;
            font-size: 19px; font-weight: 640;
            letter-spacing: -0.35px;
            color: var(--text);
            display: flex; align-items: baseline; gap: 6px;
        }
        .section-head .count {
            font-size: 13px; font-weight: 480;
            color: var(--text-tertiary);
            letter-spacing: 0;
        }

        /* ============================================================
           PRODUCT GRID · LIQUID GLASS CARDS
           ============================================================ */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 0 var(--pad);
        }
        .product-card {
            border-radius: var(--r-md);
            overflow: hidden; cursor: pointer;
            background: var(--card-glass);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 0.5px solid rgba(255,255,255,0.55);
            box-shadow:
                0 4px 16px rgba(0,0,0,0.03),
                0 1px 3px rgba(0,0,0,0.02),
                inset 0 0.5px 0 rgba(255,255,255,0.7);
            transition: all 0.4s var(--ease-out-expo);
        }
        .product-card:active {
            transform: scale(0.955);
            box-shadow:
                0 2px 8px rgba(0,0,0,0.02),
                inset 0 0.5px 0 rgba(255,255,255,0.5);
        }
        .product-card .img-area {
            aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px;
            background: linear-gradient(145deg, #fafafa 0%, #f0f0f2 100%);
            position: relative; overflow: hidden;
        }
        /* Subtle inner glow */
        .product-card .img-area::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.4) 0%, transparent 60%);
            pointer-events: none;
        }
        .product-card .img-area img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s var(--ease-out-expo);
            z-index: 0;
        }
        .product-card .img-area .emoji-fallback {
            position: relative; z-index: 1;
            filter: drop-shadow(0 8px 16px rgba(217,87,74,0.12));
            transition: transform 0.4s var(--ease-out-expo);
        }
        .product-card:active .emoji-fallback { transform: scale(1.08); }
        .product-card .card-info { padding: 11px 13px 14px; }
        .product-card .card-name {
            font-size: 13px; font-weight: 580;
            letter-spacing: -0.1px; line-height: 1.3;
            margin-bottom: 3px; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .product-card .card-desc {
            font-size: 11px; color: var(--text-secondary);
            margin-bottom: 10px; line-height: 1.35;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .product-card .card-row {
            display: flex; align-items: center; justify-content: space-between;
        }
        .product-card .price-current {
            font-size: 17px; font-weight: 650;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .product-card .price-current .yen {
            font-size: 11px; font-weight: 480;
            color: var(--text-secondary);
        }
        .product-card .add-btn {
            width: 30px; height: 30px; border-radius: 50%;
            border: none; cursor: pointer;
            font-size: 18px; font-weight: 520;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s var(--ease-spring);
            background: var(--accent-soft);
            color: var(--accent);
        }
        .product-card .add-btn:active { transform:scale(0.78); }
        .product-card .add-btn.in-cart {
            background: rgba(52,199,89,0.12);
            color: #34c759;
        }

        /* ============================================================
           SKELETON LOADING
           ============================================================ */
        .skeleton-card {
            border-radius: var(--r-md); overflow: hidden;
            background: rgba(255,255,255,0.5);
            border: 0.5px solid rgba(255,255,255,0.4);
        }
        .sk-img {
            aspect-ratio: 1;
            background: linear-gradient(105deg, #ececee 25%, #f5f5f6 50%, #ececee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .sk-info { padding:12px; }
        .sk-line {
            height: 12px; border-radius: 6px; margin-bottom: 8px;
            background: linear-gradient(105deg, #ececee 25%, #f5f5f6 50%, #ececee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .sk-line.short { width:58%; }
        .sk-line.tiny  { width:36%; height:17px; margin-top:10px; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-wrap {
            text-align: center; padding: 60px 24px; grid-column: 1/-1;
        }
        .empty-wrap .empty-icon { font-size: 52px; margin-bottom: 10px; opacity:0.7; }
        .empty-wrap .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .empty-wrap .empty-desc { font-size: 12px; color: var(--text-secondary); }

        /* ============================================================
           TOAST · DYNAMIC ISLAND STYLE
           ============================================================ */
        .toast {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-16px);
            background: rgba(29,29,31,0.86);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: #fff; padding: 10px 22px; border-radius: var(--r-xl);
            font-size: 13px; font-weight: 500; letter-spacing: -0.1px;
            z-index: 999; opacity: 0; pointer-events: none;
            border: 0.5px solid rgba(255,255,255,0.12);
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            transition: all 0.35s var(--ease-out-expo);
        }
        .toast.on { opacity:1; transform: translateX(-50%) translateY(0); }

        /* ============================================================
           FLOATING CART PILL · DYNAMIC ISLAND INSPIRED
           ============================================================ */
        .cart-pill-wrap {
            position: fixed; bottom: calc(var(--bottom-h) + 8px);
            left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: calc(var(--content-max) - 32px);
            z-index: 95;
            pointer-events: none; opacity:0;
            transition: opacity 0.35s var(--ease-out-expo),
                        transform 0.45s var(--ease-out-expo);
        }
        .cart-pill-wrap.visible { opacity:1; pointer-events:auto; }
        .cart-pill {
            display: flex; align-items: center; gap: 14px;
            background: rgba(29,29,31,0.82);
            backdrop-filter: blur(32px) saturate(210%);
            -webkit-backdrop-filter: blur(32px) saturate(210%);
            border-radius: var(--r-xl);
            padding: 8px 8px 8px 20px;
            border: 0.5px solid rgba(255,255,255,0.10);
            box-shadow:
                0 20px 48px rgba(0,0,0,0.18),
                inset 0 1px 0 rgba(255,255,255,0.10);
            cursor: pointer;
            transition: transform 0.3s var(--ease-out-expo);
        }
        .cart-pill:active { transform:scale(0.975); }
        .cart-pill .pill-icon-wrap { position:relative; flex-shrink:0; }
        .cart-pill .pill-icon { font-size:22px; }
        .cart-pill .pill-badge {
            position:absolute; top:-8px; right:-8px;
            min-width:18px; height:18px; padding:0 4px;
            background: var(--accent); color:#fff;
            font-size:10px; font-weight:650; border-radius:9px;
            display:flex; align-items:center; justify-content:center;
            border: 1.5px solid #1d1d1f;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            transition: transform 0.3s var(--ease-spring);
        }
        .cart-pill .pill-info { flex:1; }
        .cart-pill .pill-total {
            font-size: 18px; font-weight: 650; color: #fff;
            letter-spacing: -0.3px; line-height: 1.2;
        }
        .cart-pill .pill-hint {
            font-size: 11px; color: rgba(255,255,255,0.4);
            letter-spacing: 0.01em;
        }
        .cart-pill .pill-checkout {
            flex-shrink: 0; border: none;
            background: rgba(255,255,255,0.14);
            color: #fff; font-size: 14px; font-weight: 590;
            padding: 12px 22px; border-radius: var(--r-xl);
            cursor: pointer; letter-spacing: -0.1px;
            transition: all 0.25s var(--ease-apple);
        }
        .cart-pill .pill-checkout:active {
            background: rgba(255,255,255,0.22);
            transform: scale(0.94);
        }

        /* ============================================================
           CART BOTTOM SHEET
           ============================================================ */
        .scrim {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.32);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s var(--ease-apple);
        }
        .scrim.on { opacity:1; pointer-events:auto; }

        .cart-sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: var(--content-max); z-index: 210;
            max-height: 64dvh; border-radius: var(--r-lg) var(--r-lg) 0 0;
            display: flex; flex-direction: column;
            background: rgba(255,255,255,0.86);
            backdrop-filter: blur(36px) saturate(200%);
            -webkit-backdrop-filter: blur(36px) saturate(200%);
            border: 0.5px solid rgba(255,255,255,0.55);
            border-bottom: none;
            box-shadow:
                0 -10px 40px rgba(0,0,0,0.08),
                inset 0 0.5px 0 rgba(255,255,255,0.7);
            transition: transform 0.45s var(--ease-out-expo);
            padding-bottom: var(--safe-bottom);
        }
        .cart-sheet.on { transform: translateX(-50%) translateY(0); }
        .cart-sheet .sheet-handle {
            width: 38px; height: 4.5px; border-radius: 3px;
            background: rgba(0,0,0,0.12); margin: 10px auto 10px;
        }
        .cart-sheet .sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px 12px;
        }
        .cart-sheet .sheet-header h3 {
            font-size: 17px; font-weight: 620; letter-spacing: -0.25px;
        }
        .cart-sheet .sheet-header .clear-btn {
            font-size: 13px; color: var(--text-secondary); background: none;
            border: none; cursor: pointer; font-weight: 480;
            transition: color 0.2s;
        }
        .cart-sheet .sheet-header .clear-btn:active { color: var(--accent); }
        .cart-sheet .sheet-list {
            flex: 1; overflow-y: auto; padding: 4px 18px;
            display: flex; flex-direction: column; gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 6px;
            border-bottom: 0.5px solid var(--hairline);
        }
        .cart-item:last-child { border-bottom:none; }
        .cart-item .ci-icon { font-size: 34px; flex-shrink:0; }
        .cart-item .ci-mid { flex:1; min-width:0; }
        .cart-item .ci-mid .ci-name {
            font-size: 14px; font-weight: 560; letter-spacing: -0.1px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .cart-item .ci-mid .ci-price {
            font-size: 12px; color: var(--text-secondary); font-weight: 520;
        }
        .cart-item .stepper {
            display: flex; align-items: center; gap: 10px; flex-shrink:0;
        }
        .cart-item .stepper button {
            width: 28px; height: 28px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.10); background: #fff;
            font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); font-weight: 520;
            transition: all 0.2s var(--ease-spring);
        }
        .cart-item .stepper button:active { transform:scale(0.82); background: #f5f5f7; }
        .cart-item .stepper span {
            font-size: 14px; font-weight: 580; min-width: 18px; text-align: center;
        }
        .cart-empty {
            text-align: center; padding: 42px 0;
            font-size: 44px; color: #d1d1d6;
        }
        .cart-empty p { font-size:13px; color: #999; margin-top:6px; }
        .cart-sheet .sheet-footer {
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-top: 0.5px solid var(--hairline);
        }
        .sheet-footer .ft-total { font-size:13px; color: var(--text-secondary); }
        .sheet-footer .ft-total em {
            font-size:20px; font-weight:650; color: var(--text);
            font-style: normal; letter-spacing: -0.3px;
        }
        .sheet-footer .ft-btn {

<script>
(function() {
    'use strict';

    // ==================== CONFIG ====================
    const API_BASE = window.location.origin + '/mobile';
    const HERO_COUNT = 3;

    // ==================== STATE ====================
    let cart = [];
    let activeCat = 'all';
    let heroIdx = 0;
    let heroTimer;
    let submitting = false;
    let toastTimer;
    let profilePhone = localStorage.getItem('last_order_phone') || '';

    // ==================== DOM REFS ====================
    const $  = (s, p) => (p||document).querySelector(s);
    const $$ = (s, p) => (p||document).querySelectorAll(s);

    const el = {
        // Nav
        cartDot:       $('#cartDot'),
        // Hero
        heroTrack:     $('#heroTrack'),
        heroDots:      $('#heroDots'),
        hero:          $('#hero'),
        // Categories
        catScroll:     $('#catScroll'),
        // Products
        secHead:       $('#secHead'),
        productGrid:   $('#productGrid'),
        // Toast
        toast:         $('#toast'),
        // Cart pill
        cartPillWrap:  $('#cartPillWrap'),
        pillBadge:     $('#pillBadge'),
        pillTotal:     $('#pillTotal'),
        pillHint:      $('#pillHint'),
        pillCheckout:  $('#pillCheckout'),
        // Cart sheet
        scrim:         $('#scrim'),
        cartSheet:     $('#cartSheet'),
        cartList:      $('#cartList'),
        sheetTotal:    $('#sheetTotal'),
        sheetCheckout: $('#sheetCheckout'),
        clearCart:     $('#clearCart'),
        cartNavBtn:    $('#cartNavBtn'),
        // Order modal
        orderModal:    $('#orderModal'),
        inputName:     $('#inputName'),
        inputPhone:    $('#inputPhone'),
        inputAddr:     $('#inputAddr'),
        summaryQty:    $('#summaryQty'),
        summaryAmt:    $('#summaryAmt'),
        cancelOrder:   $('#cancelOrder'),
        confirmOrder:  $('#confirmOrder'),
        // Success
        successToast:  $('#successToast'),
        stOrderNo:     $('#stOrderNo'),
        confettiCanvas:$('#confettiCanvas'),
        // Bottom nav
        bottomNav:     $('#bottomNav'),
        navSlider:     $('#navSlider'),
    };

    // ==================== API ====================
    async function api(path, opts = {}) {
        const url = API_BASE + path;
        const res = await fetch(url, {
            headers: opts.body ? { 'Content-Type': 'application/json' } : {},
            ...opts,
        });
        const json = await res.json();
        if (json.code !== 1) throw new Error(json.msg || '请求失败');
        return json.data;
    }

    // ==================== TOAST ====================
    function toast(msg) {

                    ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`

                        </div>
                    </div>
                </div>`;
            }).join('');

            // Event binding
            $$('.add-btn', el.productGrid).forEach(btn => {
                btn.addEventListener('click', e => { e.stopPropagation(); addToCart(+btn.dataset.id); });

    // ==================== CART LOGIC ====================
    function addToCart(id) {
        const found = cart.find(c => c.id === id);
        found ? found.qty++ : cart.push({ id, qty: 1 });
        refreshCart();
        toast('已加入购物车 🛒');
        // Pop badge animation
        el.pillBadge.style.transform = 'scale(1.45)';
        setTimeout(() => el.pillBadge.style.transform = '', 280);
    }

    function removeFromCart(id) {
        cart = cart.filter(c => c.id !== id);
        refreshCart();
    }

    function changeQty(id, delta) {
        const item = cart.find(c => c.id === id);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) { removeFromCart(id); return; }
        refreshCart();
    }

    function getProductInfo(id) {
        const card = $(`.product-card[data-id="${id}"]`);
        if (!card) return {id,name:'商品',price:0,icon:'🍰'};
        return {
            id,
            name:   card.querySelector('.card-name')?.textContent || '商品',
            price:  parseFloat(card.querySelector('.price-current')?.textContent?.replace(/[^0-9.]/g,'')) || 0,
            icon:   card.querySelector('.emoji-fallback')?.textContent?.trim() || '🍰',
        };
    }

    function refreshCart() {
        const totalQty = cart.reduce((s,c) => s + c.qty, 0);
        const totalAmt = cart.reduce((s,c) => {
            const p = getProductInfo(c.id);
            return s + p.price * c.qty;
        }, 0);

        // Nav dot
        el.cartDot.textContent = totalQty || '';
        el.cartDot.style.display = totalQty ? 'flex' : 'none';

        // Floating pill
        if (totalQty > 0) {
            el.cartPillWrap.classList.add('visible');
            el.pillBadge.textContent = totalQty;
            el.pillTotal.textContent = `¥${totalAmt.toFixed(2)}`;
            el.pillHint.textContent = `已选 ${totalQty} 件`;
        } else {
            el.cartPillWrap.classList.remove('visible');
        }

        // Cart sheet list
        if (!cart.length) {
            el.cartList.innerHTML = `<div class="cart-empty">🛒<p>购物车是空的</p></div>`;
            el.sheetCheckout.disabled = true;
        } else {
            el.cartList.innerHTML = cart.map(c => {
                const p = getProductInfo(c.id);
                return `
                <div class="cart-item">
                    <div class="ci-icon">${p.icon}</div>
                    <div class="ci-mid">
                        <div class="ci-name">${esc(p.name)}</div>
                        <div class="ci-price">¥${p.price.toFixed(2)}</div>
                    </div>
                    <div class="stepper">
                        <button data-act="minus" data-id="${c.id}">−</button>
                        <span>${c.qty}</span>
                        <button data-act="plus" data-id="${c.id}">+</button>
                    </div>
                </div>`;
            }).join('');
            el.sheetCheckout.disabled = false;

            $$('[data-act]', el.cartList).forEach(btn => {
                btn.addEventListener('click', () => {
                    changeQty(+btn.dataset.id, btn.dataset.act==='plus'?1:-1);
                });
            });
        }

        el.sheetTotal.textContent = `¥${totalAmt.toFixed(2)}`;

        // Sync product card buttons
        $$('.add-btn', el.productGrid).forEach(btn => {
            const id = +btn.dataset.id;
            const inCart = cart.find(c => c.id === id);
            if (inCart) { btn.classList.add('in-cart'); btn.textContent='✓'; }
            else        { btn.classList.remove('in-cart'); btn.textContent='+'; }
        });
    }

        if (!/^1[3-9]\d{9}$/.test(phone)) { toast('手机号格式不正确'); el.inputPhone.focus(); return; }
        if (!addr)  { toast('请输入配送地址'); el.inputAddr.focus(); return; }

    function launchConfetti() {
        const canvas = el.confettiCanvas;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const COLORS = ['#d9574a','#f0a35c','#a78bfa','#34d399','#60a5fa','#fbbf24','#f472b6','#fff'];
        const particles = Array.from({length: 100}, () => ({
            x: Math.random() * canvas.width,
            y: -30 - Math.random() * 60,
            vx: (Math.random()-0.5)*5,
            vy: Math.random()*3 + 2,
            size: Math.random()*7 + 3,
            color: COLORS[Math.floor(Math.random()*COLORS.length)],
            spin: Math.random()*360,
            spinV: (Math.random()-0.5)*10,
            shape: Math.random()>0.5?'rect':'circle',
            alpha: 1,
        }));

        let frame = 0;
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            frame++;
            let alive = false;
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.spin += p.spinV;
                p.vy += 0.045;
                if (frame > 130) p.alpha -= 0.01;
                p.alpha = Math.max(0, p.alpha);
                if (p.alpha <= 0 || p.y > canvas.height+40) return;
                alive = true;

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.spin * Math.PI/180);
                ctx.fillStyle = p.color;
                if (p.shape==='rect') {
                    ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
                } else {
                    ctx.beginPath();
                    ctx.arc(0,0,p.size/2,0,Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            });
            if (alive) requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    }

                html += `<div class="p-growth-bar"><div class="p-growth-fill" style="width:${growthPct}%"></div></div>`;
                html += `<span class="p-growth-text">距下一级还需 ${nextGrowth - (m.growth||0)} 成长值</span>`;
                html += `</div>`;

                html += `<div class="p-growth-wrap"><span class="p-growth-text" style="color:rgba(0,0,0,0.35)">🎉 已达最高等级</span></div>`;
            }
            html += `</div>`;
            html += `<div class="p-stats">`;
            html += `<div class="p-stat"><span class="p-stat-val">${m.points||0}</span><span class="p-stat-lbl">当前积分</span></div>`;
            html += `<div class="p-stat-div"></div>`;
            html += `<div class="p-stat"><span class="p-stat-val">¥${(m.totalSpent||0).toFixed(0)}</span><span class="p-stat-lbl">累计消费</span></div>`;

                    }

                    html += `</div>`;
                    html += `<div class="p-coupon-right">`;
                    html += `<div class="p-c-name">${escHtml(c.couponName)}</div>`;
                    html += `<div class="p-c-exp">${formatExpire(c.expireAt)}</div>`;

            container.innerHTML = '<div style="text-align:center;padding:60px 0;color:#aeaeb2;">加载失败，请稍后重试</div>';

    function formatExpire(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr), now = new Date();
            const days = Math.ceil((d - now) / 86400000);
            return days <= 0 ? '已过期' : `有效期至 ${d.getMonth()+1}/${d.getDate()} (剩${days}天)`;
        } catch { return dateStr; }
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        try { return new Date(dateStr).toLocaleString('zh-CN'); } catch { return dateStr; }
    }

    // Add profilePanel to el
    el.profilePanel = $('#profilePanel');
    el.profileClose = $('#profileClose');

    window.addEventListener('resize', () => {
        const activeTab = $('.bottom-nav .tab.on');
        if (activeTab) positionSlider(activeTab);
    });

    // ==================== INIT ====================
    async function init() {
        buildHeroDots();
        startHeroTimer();
        await loadCategories();
        await loadProducts('all');
        refreshCart();
        setTimeout(initSlider, 120);
    }

    init();
    window.addEventListener('load', initSlider);

})();
</script>
</body>
</html>
